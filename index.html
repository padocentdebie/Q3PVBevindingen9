<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3PVAangifte Les 6 - Multi-Tool</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        nav { width: 280px; background: #1e293b; border-right: 2px solid #334155; display: flex; flex-direction: column; padding: 20px; }
        nav h2 { font-size: 1.2rem; color: #ffcc00; margin-bottom: 20px; text-transform: uppercase; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .nav-item { padding: 12px 15px; margin-bottom: 8px; cursor: pointer; border-radius: 8px; transition: 0.2s; background: #0f172a; border: 1px solid transparent; }
        .nav-item:hover { background: #003082; }
        .nav-item.active { background: #003082; border-color: #ffcc00; font-weight: bold; }
        main { flex: 1; overflow-y: auto; position: relative; background: #121212; }
        .screen { display: none; padding: 30px; height: 100%; box-sizing: border-box; }
        .screen.active { display: block; }
        iframe { width: 100%; height: 85vh; border: none; border-radius: 12px; background: white; }
        .instructie-blok { background: #1e293b; padding: 25px; border-radius: 12px; border-left: 6px solid #003082; margin-bottom: 20px; }
    </style>
</head>
<body>

<nav>
    <h2>Les 6 Menu</h2>
    <div class="nav-item active" onclick="showScreen(1)">Scherm 1: Digibord</div>
    <div class="nav-item" onclick="showScreen(2)">Scherm 2: Inloggen</div>
    <div class="nav-item" onclick="showScreen(3)">Scherm 3: PV Simulatie</div>
    <div class="nav-item" onclick="showScreen(4)">Scherm 4: VVT & OVT</div>
    <div class="nav-item" onclick="showScreen(5)">Scherm 5: Rede in PV</div>
    <div class="nav-item" onclick="showScreen(6)">Scherm 6: Voorzetsels Spel</div>
</nav>

<main>
    <!-- SCHERM 1: DIGIBORD (Verbeterde Teken Logica) -->
    <div id="screen1" class="screen active">
        <iframe srcdoc='<!DOCTYPE html>
        <html>
        <head>
            <style>
                body { margin: 0; background: #f0f2f5; font-family: sans-serif; overflow: hidden; touch-action: none; }
                #board-container { position: relative; width: 95vw; height: 70vh; background: white; margin: 10px auto; border: 3px solid #003082; border-radius: 15px; }
                canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
                .toolbar { position: fixed; bottom: 0; width: 100%; background: white; padding: 20px; display: flex; gap: 10px; justify-content: center; border-top: 1px solid #ccc; }
                .btn { padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
                #addBtn { background: #003082; }
                #clearBtn { background: #d32f2f; }
                #trash-zone { position: absolute; top: 10px; left: 15px; width: 60px; height: 60px; border: 2px dashed #f87171; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; opacity: 0.5; }
                #trash-zone.active { background: #ef4444; opacity: 1; transform: scale(1.1); }
            </style>
        </head>
        <body>
            <div id="board-container">
                <canvas id="whiteboard" width="1200" height="800"></canvas>
                <div id="trash-zone">🗑️</div>
            </div>
            <div class="toolbar">
                <input type="text" id="wordInput" placeholder="Typ een woord..." style="padding:12px; border-radius:8px; border:1px solid #ccc; width:250px;">
                <button id="addBtn" class="btn">Toevoegen</button>
                <button id="clearBtn" class="btn">Wis Bord</button>
            </div>

            <script type="module">
                import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
                import { getDatabase, ref, onValue, push, remove, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
                
                const firebaseConfig = { apiKey: "AIzaSyA3_rzoZOWytlyAbYKKe_WuFlD8z2WvbX4", authDomain: "aangifteq2les1.firebaseapp.com", databaseURL: "https://aangifteq2les1-default-rtdb.europe-west1.firebasedatabase.app", projectId: "aangifteq2les1" };
                const app = initializeApp(firebaseConfig);
                const db = getDatabase(app);
                const canvas = document.getElementById("whiteboard");
                const ctx = canvas.getContext("2d");
                const trashZone = document.getElementById("trash-zone");
                const boardRef = ref(db, "classes/Alpha/board");

                let objects = {};
                let isDrawing = false, isDragging = false, draggedId = null, currentPathId = null;
                let currentPoints = [];

                const getPos = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    return {
                        x: (clientX - rect.left) * (canvas.width / rect.width),
                        y: (clientY - rect.top) * (canvas.height / rect.height),
                        rawX: clientX, rawY: clientY
                    };
                };

                canvas.addEventListener("mousedown", (e) => {
                    const { x, y } = getPos(e);
                    // Check voor tekst verslepen
                    for (const [id, obj] of Object.entries(objects).reverse()) {
                        if (obj.type === "text") {
                            ctx.font = "bold 24px Arial";
                            const w = ctx.measureText(obj.text).width;
                            if (x > obj.x - 10 && x < obj.x + w + 10 && y > obj.y - 35 && y < obj.y + 15) {
                                draggedId = id; isDragging = true; return;
                            }
                        }
                    }
                    // Start nieuwe lijn
                    isDrawing = true;
                    currentPoints = [{x, y}];
                    const newRef = push(boardRef);
                    currentPathId = newRef.key;
                    set(newRef, { type: "path", points: currentPoints });
                });

                window.addEventListener("mousemove", (e) => {
                    if (!isDrawing && !isDragging) return;
                    const { x, y, rawX, rawY } = getPos(e);

                    if (isDrawing && currentPathId) {
                        currentPoints.push({x, y});
                        update(ref(db, `classes/Alpha/board/${currentPathId}`), { points: currentPoints });
                    }
                    if (isDragging && draggedId) {
                        update(ref(db, `classes/Alpha/board/${draggedId}`), { x: x - 20, y: y + 10 });
                        const tRect = trashZone.getBoundingClientRect();
                        trashZone.classList.toggle("active", rawX > tRect.left && rawX < tRect.right && rawY > tRect.top && rawY < tRect.bottom);
                    }
                });

                window.addEventListener("mouseup", () => {
                    if (isDragging && draggedId && trashZone.classList.contains("active")) {
                        remove(ref(db, `classes/Alpha/board/${draggedId}`));
                    }
                    isDrawing = false; isDragging = false; draggedId = null; currentPathId = null;
                    trashZone.classList.remove("active");
                });

                // Renderen van alle objecten
                onValue(boardRef, (snap) => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    objects = snap.val() || {};
                    for (let id in objects) {
                        const obj = objects[id];
                        if (obj.type === "text") {
                            ctx.font = "bold 24px Arial"; ctx.fillStyle = "#333";
                            ctx.fillText(obj.text, obj.x, obj.y);
                        } else if (obj.type === "path" && obj.points) {
                            ctx.beginPath(); ctx.strokeStyle = "#4b5563"; ctx.lineWidth = 3; ctx.lineCap = "round";
                            ctx.moveTo(obj.points[0].x, obj.points[0].y);
                            obj.points.forEach(p => ctx.lineTo(p.x, p.y));
                            ctx.stroke();
                        }
                    }
                });

                document.getElementById("addBtn").onclick = () => {
                    const val = document.getElementById("wordInput").value;
                    if(val) push(boardRef, { type: "text", text: val, x: 100, y: 100 });
                    document.getElementById("wordInput").value = "";
                };
                document.getElementById("clearBtn").onclick = () => { if(confirm("Bord wissen?")) remove(boardRef); };
            </script>
        </body>
        </html>'></iframe>
    </div>

            </div>
        </body>
        </html>'></iframe>

    <!-- OVERIGE SCHERMEN -->
    <div id="screen4" class="screen"><iframe src="https://learningapps.org/watch?v=pizhauruk25"></iframe></div>
    <div id="screen5" class="screen"><iframe src="https://learningapps.org/watch?v=pdkpf1wsa25"></iframe></div>
    <div id="screen6" class="screen">
        <div class="instructie-blok"><h3>Voorzetsels Oefening</h3><p>Zoek de juiste match!</p></div>
        <iframe src="https://learningapps.org/watch?v=pizhauruk25"></iframe>
    </div>
</main>

<script>
    function showScreen(nr) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen' + nr).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.nav-item')[nr-1].classList.add('active');
    }
</script>

</body>
</html>
