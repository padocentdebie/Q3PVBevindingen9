    <div id="screen1" class="screen active">
        <iframe srcdoc='<!DOCTYPE html>
        <html>
        <head>
            <style>
                body { margin: 0; background: #f0f2f5; font-family: sans-serif; overflow: hidden; touch-action: none; }
                #board-container { position: relative; width: 98%; height: calc(100vh - 85px); background: white; margin: 5px auto; border: 2px solid #003082; border-radius: 10px; }
                canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
                .toolbar { height: 60px; background: white; display: flex; gap: 10px; justify-content: center; align-items: center; border-top: 1px solid #ccc; }
                .btn { padding: 8px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; font-size: 13px; }
                #addBtn { background: #003082; }
                #clearBtn { background: #d32f2f; }
                #trash-zone { position: absolute; top: 10px; left: 15px; width: 45px; height: 45px; border: 2px dashed #f87171; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; opacity: 0.5; background: white; }
                #trash-zone.active { background: #ef4444; opacity: 1; color: white; }
            </style>
        </head>
        <body>
            <div id="board-container"><canvas id="whiteboard" width="1200" height="800"></canvas><div id="trash-zone">🗑️</div></div>
            <div class="toolbar">
                <input type="text" id="wordInput" placeholder="Woord..." style="padding:8px; border-radius:6px; border:1px solid #ccc;">
                <button id="addBtn" class="btn">Toevoegen</button>
                <button id="clearBtn" class="btn">Wis</button>
            </div>
            <script type="module">
                import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
                import { getDatabase, ref, onValue, push, remove, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
                const firebaseConfig = { apiKey: "AIzaSyB12mTMBnuxdC4W4htyFO_C7Dnh3maVKew", databaseURL: "https://decoroefening-default-rtdb.europe-west1.firebasedatabase.app", projectId: "decoroefening" };
                const app = initializeApp(firebaseConfig); const db = getDatabase(app);
                const canvas = document.getElementById("whiteboard"); const ctx = canvas.getContext("2d");
                const boardRef = ref(db, "classes/Alpha/board");
                let objects = {}, isDrawing = false, isDragging = false, draggedId = null, currentPathId = null, currentPoints = [];

                const getPos = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height), rawX: clientX, rawY: clientY };
                };

                canvas.addEventListener("mousedown", (e) => {
                    const { x, y } = getPos(e);
                    for (const [id, obj] of Object.entries(objects).reverse()) {
                        if (obj.type === "text") {
                            ctx.font = "bold 24px Arial"; const w = ctx.measureText(obj.text).width;
                            if (x > obj.x - 10 && x < obj.x + w + 10 && y > obj.y - 35 && y < obj.y + 15) { draggedId = id; isDragging = true; return; }
                        }
                    }
                    isDrawing = true; currentPoints = [{x, y}];
                    const newRef = push(boardRef); currentPathId = newRef.key;
                    set(newRef, { type: "path", points: currentPoints });
                });

                window.addEventListener("mousemove", (e) => {
                    if (!isDrawing && !isDragging) return;
                    const { x, y, rawX, rawY } = getPos(e);
                    if (isDrawing && currentPathId) {
                        currentPoints.push({x, y}); update(ref(db, `classes/Alpha/board/${currentPathId}`), { points: currentPoints });
                    }
                    if (isDragging && draggedId) {
                        update(ref(db, `classes/Alpha/board/${draggedId}`), { x: x - 20, y: y + 10 });
                        const tRect = document.getElementById("trash-zone").getBoundingClientRect();
                        document.getElementById("trash-zone").classList.toggle("active", rawX > tRect.left && rawX < tRect.right && rawY > tRect.top && rawY < tRect.bottom);
                    }
                });

                window.addEventListener("mouseup", () => {
                    if (isDragging && draggedId && document.getElementById("trash-zone").classList.contains("active")) remove(ref(db, `classes/Alpha/board/${draggedId}`));
                    isDrawing = isDragging = false; draggedId = currentPathId = null; document.getElementById("trash-zone").classList.remove("active");
                });

                onValue(boardRef, (snap) => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height); objects = snap.val() || {};
                    for (let id in objects) {
                        const obj = objects[id];
                        if (obj.type === "text") { ctx.font = "bold 24px Arial"; ctx.fillStyle = "#333"; ctx.fillText(obj.text, obj.x, obj.y); }
                        else if (obj.type === "path" && obj.points) {
                            ctx.beginPath(); ctx.strokeStyle = "#4b5563"; ctx.lineWidth = 3; ctx.lineCap = "round";
                            ctx.moveTo(obj.points[0].x, obj.points[0].y); obj.points.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
                        }
                    }
                });
                document.getElementById("addBtn").onclick = () => {
                    const val = document.getElementById("wordInput").value;
                    if(val) push(boardRef, { type: "text", text: val, x: 100, y: 100 });
                    document.getElementById("wordInput").value = "";
                };
                document.getElementById("clearBtn").onclick = () => { if(confirm("Wissen?")) remove(boardRef); };
            </script>
        </body>
        </html>'></iframe>

<body>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const firebaseConfig = { apiKey: "AIzaSyB12mTMBnuxdC4W4htyFO_C7Dnh3maVKew", databaseURL: "https://decoroefening-default-rtdb.europe-west1.firebasedatabase.app", projectId: "decoroefening" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentAgent = localStorage.getItem("currentAgentName") || "Onbekend";
        const submissionsRef = ref(db, "pv_submissions");
        const textarea = document.getElementById("myPV");

        document.getElementById("submitBtn").addEventListener("click", async () => {
            const pvText = textarea.value.trim();
            if (!pvText) return;
            await push(submissionsRef, { agent: currentAgent, text: pvText, timestamp: Date.now(), feedbacks: {} });
            document.getElementById("submitStatus").innerHTML = "✅ Ingeleverd!";
        });

        window.giveFeedback = async (submissionId, agentTo, fbText) => {
            if (!fbText.trim()) return;
            await set(ref(db, `pv_submissions/${submissionId}/feedbacks/${currentAgent}`), { from: currentAgent, feedback: fbText, timestamp: Date.now() });
        };

        onValue(submissionsRef, (snapshot) => {
            const submissions = snapshot.val();
            const feedDiv = document.getElementById("liveFeed");
            if (!submissions) return;
            const arr = Object.entries(submissions).map(([id, data]) => ({ id, ...data })).sort((a, b) => b.timestamp - a.timestamp);
            let html = "";
            for (let sub of arr) {
                html += `<div class="submission-item"><strong>👮 ${sub.agent}</strong><div class="submission-text">${sub.text}</div>`;

                html += `</div>`;
            }

        });

<script>
    window.loginAndGoToPV = function() {
        const selectedName = document.getElementById("agentNameSelect").value;
        if (!selectedName) { document.getElementById("loginError").innerText = "Kies een naam"; return; }
        localStorage.setItem("currentAgentName", selectedName);
        showScreen(3);

    function showScreen(nr) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen' + nr).classList.add('active');
        document.querySelectorAll('.nav-item').forEach((n, i) => n.classList.toggle('active', i === nr-1));
    }
